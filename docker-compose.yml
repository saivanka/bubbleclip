services:
  bubbleclip:
    build: .
    container_name: bubbleclip
    ports:
      # To make it reachable ONLY via Tailscale (invisible to normal LAN),
      # prefix with this host's Tailscale IP, e.g.:
      #   - "100.86.4.35:5678:5678"
      - "5678:5678"
    volumes:
      - bubbleclip-data:/app/data
    restart: unless-stopped
    environment:
      - PORT=5678
      - MAX_HISTORY=50
      # Optional: pin your own code instead of the auto-generated one.
      # - ACCESS_CODE=${ACCESS_CODE}

volumes:
  bubbleclip-data:
